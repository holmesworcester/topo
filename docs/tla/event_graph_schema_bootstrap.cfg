  ActiveEvents = {"workspace", "invite_accepted", "user_invite_bootstrap", "user_invite_ongoing", "user_bootstrap", "user_ongoing", "device_invite_first", "device_invite_ongoing", "peer_shared_first", "peer_shared_ongoing", "admin_bootstrap"}
  Peers = {"alice", "bob"}
  Workspaces = {"main", "foreign"}

