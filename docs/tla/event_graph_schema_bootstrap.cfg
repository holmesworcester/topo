\* Bootstrap scenario: exercises the identity/join chain and connection
\* state machine that was previously modeled by BootstrapGraph.tla.
\* Peers = {"alice", "bob"}, identity event subset only.
\*
\* NOTE: 2 peers × 11 events × 2 workspaces × 5 conn states is a large state
\* space. For faster validation, reduce to Peers = {"alice"}.
